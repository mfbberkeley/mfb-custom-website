<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Microfinance at Berkeley</title>
  <link rel="icon" href="images/favicon.jpg" type="image/jpg">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/roster_editor.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">


</head>
<body class="about-page">

  <!-- Navbar -->
  <div class="title-section">
    <div id="navbar"></div>
    <script>
      fetch('/navbar.html')
        .then(res => res.text())
        .then(html => { document.getElementById('navbar').innerHTML = html })
    </script>
    <div class="title">
      <p>LOGIN</p>
    </div>
  </div>
  <button class="btn-google" onclick="loginWithGoogle()">
  <svg class="btn-google-icon" viewBox="0 0 24 24" aria-hidden="true">
    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
  </svg>
  Continue with Google
</button>


  <!-- Footer -->
  <div id="footer"></div>
  <script>
  fetch('/footer.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('footer').innerHTML = html
    })
  </script>

  <script src="js/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ltkyxgsgkwqowxikatub.supabase.co";
    const supabaseKey = "sb_publishable_JRIwBltGZdjZZod9qnNPzw_p3RiR4B3";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    (async () => {
      const { data } = await supabaseClient.auth.getUser();
      if (data.user) {
        window.location.replace("/admin.html");
      } else {
        document.querySelector(".login-card").classList.add("ready");
      }
    })();

    const status = document.getElementById("status");
    function setStatus(msg, type = "") {
      status.textContent = msg;
      status.className = type;
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email || !password) {
        setStatus("Enter your email and password.", "error");
        return;
      }
      setStatus("Signing in…");
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        setStatus(error.message, "error");
        return;
      }
      setStatus("Signed in — redirecting…", "success");
      window.location.href = "/admin.html";
    }

    async function sendLink() {
      const email = document.getElementById("email").value.trim();
      if (!email) {
        setStatus("Enter your email above first.", "error");
        return;
      }
      setStatus("Sending link…");
      const { error } = await supabaseClient.auth.signInWithOtp({ email });
      if (error) {
        setStatus(error.message, "error");
        return;
      }
      setStatus("Check your email for the login link.", "success");
    }

    // Submit on Enter from either input
    ["email", "password"].forEach(id => {
      document.getElementById(id).addEventListener("keydown", e => {
        if (e.key === "Enter") login();
      });
    });
    async function loginWithGoogle() {
  const { error } = await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/admin.html"
    }
  });
  if (error) setStatus(error.message, "error");
}
  </script>
  
</body>
</html>
