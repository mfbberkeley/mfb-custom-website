

<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team - Microfinance at Berkeley</title>
  <link rel="icon" href="images/favicon.jpg" type="image/png">
  <link rel="stylesheet" href="css/styles.css"> <!-- Link to external stylesheet -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<body class="team-page">
    <!--
     Use Excel file and convert to JSON to update
     Include {first_name}-{last_name}.webp in images/team

    <!--

    -->
    <!-- Navbar -->
    <!-- Section 1 (Title)-->
     <div class="title-section">
    <div id="navbar"></div>
     <script>
      fetch('/navbar.html')
        .then(res => res.text())
        .then(html => {
          document.getElementById('navbar').innerHTML = html
        })
     </script>
      <div class="title">
        <p>TEAM</p>
      </div>
    </div>

    <!-- Executive Board Section -->
    <section class="executive-board">
        <h2 class="executive-board-title">EXECUTIVE BOARD</h2>
        <div class="portrait-grid" id="exec-grid"></div>
    </section>

    <!-- Board Section -->
    <section class="board">
        <h2 class="board-title">BOARD</h2>
        <div class="portrait-grid" id="board-grid"></div>
    </section>

    <!-- Members Section -->
    <section class="members">
        <h2 class="members-title">MEMBERS</h2>
        <div class="members-grid" id="members-grid">
        </div>
    </section>

    <!-- Footer -->
   <div id="footer"></div>
  <script>
  fetch('/footer.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('footer').innerHTML = html
    })
  </script>
    <script src="js/index.js"></script>






    <script>
    
        const supabaseUrl = 'https://ltkyxgsgkwqowxikatub.supabase.co'
        const supabaseKey = 'sb_publishable_JRIwBltGZdjZZod9qnNPzw_p3RiR4B3'

        const client = supabase.createClient(
            supabaseUrl,
            supabaseKey
        )

        async function loadPlayers() {
            const { data, error } = await client
            .from('members')
            .select('*')
            .order('sort_order', { ascending: true })
            .order('name', { ascending: true })  // tiebreaker

            if (error) {
            console.error(error)
            return
            }
            console.log(data)

            

            var memberWrapper = document.getElementById("members-grid");
            const execWrapper = document.getElementById("exec-grid");
            const boardGrid = document.getElementById("board-grid");
            data.forEach(member => {
                if (member.group == "member") {
                    memberWrapper.innerHTML += `
                        <div class="member-card">
                            <div class="member-portrait" style="background-image: url('${member.image_url}')"></div>
                            <h3 class="member-name">${member.name}</h3>
                            <p class="member-title">${member.title}</p>
                        </div>
                    `;
                } else if (member.group == "exec") {
                    execWrapper.innerHTML += `
                        <div class="portrait-card">
                            <div class="flip-card">
                                <div class="flip-card-inner">
                                    <div class="flip-card-front exec-portrait-0" style="background-image: url('${member.image_url}')"></div>
                                    <div class="flip-card-back">
                                        <p class="year-major">
                                            Year: ${member.year} <br>
                                            Major: ${member.major}
                                        </p>
                                        <p class="hobbies">
                                            Hobbies: ${member.hobbies}
                                        </p>
                                        <div class="flip-socials">
                                            <a href="mailto:${member.email}">
                                                <img loading="lazy" src="images/home/mail-logo.png" alt="email icon" class="icon"/>
                                            </a>
                                            <a href="${member.linkedin}" target="_blank">
                                                <img loading="lazy" src="images/home/linkedin-logo.png" alt="linkedin icon" class="icon"/>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <h3 class="portrait-name">${member.name}</h3>
                            <p class="portrait-title">${member.title}</p>
                        </div>
                    `;
                } else if (member.group == "board") {
                    boardGrid.innerHTML += `
                        <div class="portrait-card">
                        <div class="flip-card">
                            <div class="flip-card-inner">
                            <div class="flip-card-front portrait-0" style="background-image: url('${member.image_url}')"></div>
                            <div class="flip-card-back">
                                <p class="year-major">
                                Year: ${member.year} <br>
                                Major: ${member.major}
                                </p>
                                <p class="hobbies">
                                Hobbies: ${member.hobbies}
                                </p>
                                <div class="flip-socials">
                                <a href="mailto:${member.email}">
                                    <img src="images/home/mail-logo.png" alt="email icon" class="icon"/>
                                </a>
                                <a href="${member.linkedin}" target="_blank">
                                    <img src="images/home/linkedin-logo.png" alt="linkedin icon" class="icon"/>
                                </a>
                                </div>
                            </div>
                            </div>
                        </div>
                        <h3 class="portrait-name">${member.name}</h3>
                        <p class="portrait-title">${member.title}</p>
                        </div>
                    `;
                }
            });
        }
        window.addEventListener("DOMContentLoaded", () => {
            loadPlayers()
        })
        </script>
</body>
</html>
